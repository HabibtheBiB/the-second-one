<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compass Locator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
            font-size: 24px;
            color: #aaaaaa;
        }
        #compass-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #arrow {
            font-size: 150px;
            font-weight: bold;
            line-height: 1;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        #info-panel {
            margin-bottom: 20px;
        }
        #distance {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #status {
            font-size: 14px;
            color: #888;
            height: 20px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            padding-bottom: 40px;
        }
        button {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h1>Locator Compass</h1>
    
    <div id="compass-container">
        <div id="arrow">↑</div>
    </div>

    <div id="info-panel">
        <div id="distance">Select an item</div>
        <div id="status">Waiting for input...</div>
    </div>

    <div class="buttons">
        <button onclick="findNearest('alcohol')">🍺 Beer</button>
        <button onclick="findNearest('tobacco')">🚬 Cigs</button>
        <button onclick="findNearest('florist')">🌹 Flowers</button>
        <button onclick="findNearest('cafe')">☕ Coffee</button>
    </div>

    <script>
        let currentLat = null;
        let currentLon = null;
        let targetLat = null;
        let targetLon = null;
        let currentHeading = 0;
        let watchId = null;

        const arrow = document.getElementById('arrow');
        const distanceEl = document.getElementById('distance');
        const statusEl = document.getElementById('status');

        const categoryMap = {
            'alcohol': '["shop"="alcohol"]',
            'tobacco': '["shop"="tobacco"]',
            'florist': '["shop"="florist"]',
            'cafe': '["amenity"="cafe"]'
        };

        // We must use async/await to force the code to wait for your taps
        async function findNearest(categoryKey) {
            statusEl.innerText = "1/3: Requesting compass...";
            
            // STEP 1: Ask for Compass First (iOS requires this to happen instantly after a click)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startCompass();
                    } else {
                        statusEl.innerText = "Compass permission denied.";
                        return; // Stop the code here
                    }
                } catch (error) {
                    statusEl.innerText = "Error requesting compass.";
                    return;
                }
            } else {
                startCompass(); // Non-iOS devices
            }

            // STEP 2: Ask for Location
            statusEl.innerText = "2/3: Getting GPS location...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLon = position.coords.longitude;
                        
                        // STEP 3: Fetch the map data
                        fetchFromOverpass(categoryKey, currentLat, currentLon);
                        
                        // Keep updating location in the background
                        if(!watchId) {
                            watchId = navigator.geolocation.watchPosition((pos) => {
                                currentLat = pos.coords.latitude;
                                currentLon = pos.coords.longitude;
                                updateUI();
                            }, null, { enableHighAccuracy: true });
                        }
                    },
                    (error) => {
                        statusEl.innerText = `GPS Error: ${error.message}`;
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                statusEl.innerText = "Geolocation not supported.";
            }
        }

        function startCompass() {
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            let heading = null;
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha; 
            }

            if (heading !== null) {
                currentHeading = heading;
                updateUI();
            }
        }

        async function fetchFromOverpass(categoryKey, lat, lon) {
            statusEl.innerText = "3/3: Searching nearby shops...";
            const tag = categoryMap[categoryKey];
            const searchRadius = 3000; 

            const query = `
                [out:json];
                node${tag}(around:${searchRadius},${lat},${lon});
                out center 1;
            `;
            
            // Swapped to a highly reliable French OpenStreetMap server
            const url = `https://overpass.openstreetmap.fr/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Map server rejected request");
                
                const data = await response.json();

                if (data.elements && data.elements.length > 0) {
                    targetLat = data.elements[0].lat;
                    targetLon = data.elements[0].lon;
                    const name = data.elements[0].tags.name || "Unnamed shop";
                    statusEl.innerText = `Found: ${name}`;
                    updateUI();
                } else {
                    statusEl.innerText = "No shops found within 3km.";
                    targetLat = null;
                    targetLon = null;
                    distanceEl.innerText = "N/A";
                    arrow.style.transform = `rotate(0deg)`;
                }
            } catch (error) {
                statusEl.innerText = `Map Error: ${error.message}`;
            }
        }

        function updateUI() {
            if (!currentLat || !currentLon || !targetLat || !targetLon) return;

            const R = 6371e3; 
            const φ1 = currentLat * Math.PI/180;
            const φ2 = targetLat * Math.PI/180;
            const Δφ = (targetLat-currentLat) * Math.PI/180;
            const Δλ = (targetLon-currentLon) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = Math.round(R * c);

            distanceEl.innerText = `${distance} meters away`;

            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
            const θ = Math.atan2(y, x);
            const bearing = (θ*180/Math.PI + 360) % 360;

            let rotation = bearing - currentHeading;
            arrow.style.transform = `rotate(${rotation}deg)`;
        }    
    </script>
</body>
</html>
