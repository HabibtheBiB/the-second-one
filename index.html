<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compass Locator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
            font-size: 24px;
            color: #aaaaaa;
        }
        #compass-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #arrow {
            font-size: 150px;
            font-weight: bold;
            line-height: 1;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        #info-panel {
            margin-bottom: 20px;
        }
        #distance {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #status {
            font-size: 14px;
            color: #888;
            height: 20px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            padding-bottom: 40px;
        }
        button {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h1>Locator Compass</h1>
    
    <div id="compass-container">
        <div id="arrow">↑</div>
    </div>

    <div id="info-panel">
        <div id="distance">Select an item</div>
        <div id="status">Waiting for input...</div>
    </div>

    <div class="buttons">
        <button onclick="findNearest('alcohol')">🍺 Beer</button>
        <button onclick="findNearest('tobacco')">🚬 Cigs</button>
        <button onclick="findNearest('florist')">🌹 Flowers</button>
        <button onclick="findNearest('cafe')">☕ Coffee</button>
    </div>

    <script>
        let currentLat = null;
        let currentLon = null;
        let targetLat = null;
        let targetLon = null;
        let currentHeading = 0;
        let watchId = null;

        const arrow = document.getElementById('arrow');
        const distanceEl = document.getElementById('distance');
        const statusEl = document.getElementById('status');

        const categoryMap = {
            'alcohol': '["shop"="alcohol"]',
            'tobacco': '["shop"="tobacco"]',
            'florist': '["shop"="florist"]',
            'cafe': '["amenity"="cafe"]'
        };

        async function findNearest(categoryKey) {
            statusEl.innerText = "1/3: Requesting compass...";
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startCompass();
                    } else {
                        statusEl.innerText = "Compass permission denied.";
                        return; 
                    }
                } catch (error) {
                    statusEl.innerText = "Error requesting compass.";
                    return;
                }
            } else {
                startCompass(); 
            }

            statusEl.innerText = "2/3: Getting GPS location...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLon = position.coords.longitude;
                        
                        // Successfully call the map search
                        fetchFromOverpass(categoryKey, currentLat, currentLon);
                        
                        // Track movement
                        if(!watchId) {
                            watchId = navigator.geolocation.watchPosition((pos) => {
                                currentLat = pos.coords.latitude;
                                currentLon = pos.coords.longitude;
                                updateUI();
                            }, null, { enableHighAccuracy: true });
                        }
                    },
                    (error) => {
                        statusEl.innerText = `GPS Error: ${error.message}`;
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                statusEl.innerText = "Geolocation not supported.";
            }
        }

        function startCompass() {
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            let heading = null;
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha; 
            }

            if (heading !== null) {
                currentHeading = heading;
                updateUI();
            }
        }

async function fetchFromOverpass(categoryKey, lat, lon) {
            statusEl.innerText = "3/3: Searching nearby shops...";
            
            // Map your categories to Geoapify's place categories
            // Full list: https://apidocs.geoapify.com/docs/places/#categories
            const categoryMapping = {
                'alcohol': 'commercial.food_and_drink.liquor',
                'tobacco': 'commercial.tobacco',
                'cafe': 'amenity.cafe'
            };

            const geoapifyCategory = categoryMapping[categoryKey] || 'amenity.cafe';
            const searchRadiusMeters = 2000; 
            
            // paste your Geoapify API key here
            const apiKey = "YOUR_GEOAPIFY_API_KEY"; 

            // Building the clean Geoapify Places URL
            const url = `https://api.geoapify.com/v2/places?categories=${geoapifyCategory}&filter=circle:${lon},${lat},${searchRadiusMeters}&bias=proximity:${lon},${lat}&limit=1&apiKey=${apiKey}`;

            try {
                statusEl.innerText = "Searching commercial database...";
                const response = await fetch(url);
                
                if (!response.ok) {
                    statusEl.innerText = `API Error: Status ${response.status}`;
                    return;
                }

                const data = await response.json();
                console.log("Geoapify Response:", data);

                if (data.features && data.features.length > 0) {
                    const place = data.features[0].properties;
                    
                    // Geoapify returns coordinates as [longitude, latitude]
                    const coordinates = data.features[0].geometry.coordinates;
                    targetLat = coordinates[1];
                    targetLon = coordinates[0];
                    
                    const name = place.name || `Local ${categoryKey} shop`;
                    statusEl.innerText = `Found: ${name}`;
                    updateUI();
                } else {
                    statusEl.innerText = "No shops found within 2km.";
                    targetLat = null;
                    targetLon = null;
                    distanceEl.innerText = "N/A";
                    arrow.style.transform = `rotate(0deg)`;
                }
            } catch (error) {
                statusEl.innerText = `Search Error: ${error.message}`;
                console.error(error);
            }
        }

        function updateUI() {
            if (!currentLat || !currentLon || !targetLat || !targetLon) return;

            const R = 6371e3; 
            const φ1 = currentLat * Math.PI/180;
            const φ2 = targetLat * Math.PI/180;
            const Δφ = (targetLat-currentLat) * Math.PI/180;
            const Δλ = (targetLon-currentLon) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = Math.round(R * c);

            distanceEl.innerText = `${distance} meters away`;

            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
            const θ = Math.atan2(y, x);
            const bearing = (θ*180/Math.PI + 360) % 360;

            let rotation = bearing - currentHeading;
            arrow.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
